<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Management System</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   COLORS
========================= */

:root{
    --bg:#050505;
    --card:#111;
    --red:#ff0033;
    --text:#ffffff;
    --green:#00ff88;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Consolas, monospace;
    min-height:100vh;
    overflow-x:hidden;
}

/* Matrix canvas */
#matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Main container */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* Header */
h1{
    text-align:center;
    color:var(--red);
    text-shadow:0 0 15px var(--red);
    margin-bottom:30px;
}

/* Terminal input area */
.terminal{
    background:#000;
    border:1px solid var(--red);
    padding:15px;
    margin-bottom:25px;
}

.prompt{
    color:var(--green);
    margin-bottom:10px;
}

.input-row{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    background:#111;
    color:white;
    border:1px solid #333;
    outline:none;
}

button{
    padding:12px 18px;
    background:transparent;
    color:white;
    border:1px solid var(--red);
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:var(--red);
}

/* Dashboard */
.dashboard{
    background:rgba(17,17,17,.95);
    border:1px solid #222;
    padding:20px;
    margin-bottom:25px;
}

.stat{
    margin-bottom:10px;
}

.progress{
    height:20px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:var(--red);
    transition:.3s;
}

/* Task section */
.tasks{
    background:rgba(17,17,17,.95);
    border:1px solid #222;
    padding:20px;
}

.task{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px;
    border-bottom:1px solid #222;
}

.task-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.task.completed span{
    text-decoration:line-through;
    opacity:.5;
}

.delete-btn{
    border-color:#555;
}

.delete-btn:hover{
    background:#990000;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#888;
}

/* Mobile */
@media(max-width:600px){

    .input-row{
        flex-direction:column;
    }

    button{
        width:100%;
    }

}

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

    <h1>TASK MANAGEMENT SYSTEM</h1>

    <!-- Terminal -->
    <div class="terminal">

        <div class="prompt">
            root@matrix:~$
        </div>

        <div class="input-row">
            <input
                id="taskInput"
                type="text"
                placeholder="Enter mission objective..."
            >

            <button onclick="addTask()">
                ADD
            </button>
        </div>

    </div>

    <!-- Dashboard -->
    <div class="dashboard">

        <div class="stat">
            Total Tasks:
            <span id="totalTasks">0</span>
        </div>

        <div class="stat">
            Completed:
            <span id="completedTasks">0</span>
        </div>

        <div class="stat">
            Pending:
            <span id="pendingTasks">0</span>
        </div>

        <br>

        <div class="progress">
            <div
                class="progress-bar"
                id="progressBar">
            </div>
        </div>

    </div>

    <!-- Task List -->
    <div class="tasks">

        <h2>ACTIVE MISSIONS</h2>

        <br>

        <div id="taskList"></div>

    </div>

    <div class="footer">
        SYSTEM STATUS: ONLINE
    </div>

</div>

<script>

/* =========================
   TASK SYSTEM
========================= */

let tasks =
    JSON.parse(
        localStorage.getItem("tasks")
    ) || [];

/* Save tasks */
function saveTasks(){
    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

/* Add task */
function addTask(){

    const input =
        document.getElementById(
            "taskInput"
        );

    const text =
        input.value.trim();

    if(text === "") return;

    tasks.push({
        text:text,
        completed:false
    });

    input.value = "";

    saveTasks();
    renderTasks();
}

/* Toggle completed */
function toggleTask(index){

    tasks[index].completed =
        !tasks[index].completed;

    saveTasks();
    renderTasks();
}

/* Delete task */
function deleteTask(index){

    tasks.splice(index,1);

    saveTasks();
    renderTasks();
}

/* Render all tasks */
function renderTasks(){

    const taskList =
        document.getElementById(
            "taskList"
        );

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        const div =
            document.createElement("div");

        div.className =
            "task" +
            (task.completed
            ? " completed"
            : "");

        div.innerHTML = `
            <div class="task-left">
                <input
                    type="checkbox"
                    ${task.completed
                        ? "checked"
                        : ""}
                    onchange="toggleTask(${index})"
                >

                <span>
                    ${task.text}
                </span>
            </div>

            <button
                class="delete-btn"
                onclick="deleteTask(${index})">
                DELETE
            </button>
        `;

        taskList.appendChild(div);
    });

    updateStats();
}

/* Dashboard statistics */
function updateStats(){

    const total =
        tasks.length;

    const completed =
        tasks.filter(
            t => t.completed
        ).length;

    const pending =
        total - completed;

    document.getElementById(
        "totalTasks"
    ).textContent = total;

    document.getElementById(
        "completedTasks"
    ).textContent = completed;

    document.getElementById(
        "pendingTasks"
    ).textContent = pending;

    const percentage =
        total === 0
        ? 0
        : (completed/total)*100;

    document.getElementById(
        "progressBar"
    ).style.width =
        percentage + "%";
}

/* Enter key support */
document
.getElementById("taskInput")
.addEventListener(
    "keypress",
    function(event){

        if(event.key==="Enter"){
            addTask();
        }

    }
);

/* Initial load */
renderTasks();

/* =========================
   MATRIX BACKGROUND
========================= */

const canvas =
    document.getElementById(
        "matrix"
    );

const ctx =
    canvas.getContext("2d");

canvas.width =
    window.innerWidth;

canvas.height =
    window.innerHeight;

const chars =
    "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const letters =
    chars.split("");

const fontSize = 16;

const columns =
    canvas.width / fontSize;

const drops = [];

for(let i=0;i<columns;i++){
    drops[i]=1;
}

function drawMatrix(){

    ctx.fillStyle =
        "rgba(0,0,0,0.07)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle =
        "#ff0033";

    ctx.font =
        fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
            letters[
                Math.floor(
                    Math.random()
                    *
                    letters.length
                )
            ];

        ctx.fillText(
            text,
            i*fontSize,
            drops[i]*fontSize
        );

        if(
            drops[i]*fontSize >
            canvas.height &&
            Math.random()>0.975
        ){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(
    drawMatrix,
    35
);

window.addEventListener(
    "resize",
    ()=>{

        canvas.width =
            window.innerWidth;

        canvas.height =
            window.innerHeight;
    }
);

</script>

</body>
</html>
